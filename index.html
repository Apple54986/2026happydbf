<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>端午節 蛋站驚心🥚</title>
    <style>
        :root {
            --mint-green: #e8f5e9;
            --bamboo-green: #81c784;
            --sky-blue: #e0f7fa;
            --accent-gold: #ffd700;
            --text-dark: #2e7d32;
            --success-gold: #fb8c00;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, var(--sky-blue) 0%, var(--mint-green) 100%);
            color: var(--text-dark);
        }

        .bg-leaf {
            position: absolute;
            width: 300px;
            height: 100px;
            background: rgba(129, 199, 132, 0.1);
            border-radius: 0 100% 0 100%;
            transform: rotate(-15deg);
            z-index: 0;
        }
        .leaf-1 { top: 10%; left: -50px; }
        .leaf-2 { bottom: 15%; right: -50px; transform: rotate(165deg); }

        #game-ui {
            position: relative;
            z-index: 10;
            text-align: center;
            padding-top: 40px;
        }

        .timer-display {
            font-size: 1.5rem;
            font-weight: bold;
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: inline-block;
        }

        #stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        #egg-frame {
            width: 120px;
            height: 160px;
            border: 3px dashed var(--bamboo-green);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        /* 當蛋在框內時的發光效果 */
        #egg-frame.holding {
            border: 4px solid var(--success-gold);
            box-shadow: 0 0 20px rgba(251, 140, 0, 0.4);
            opacity: 1;
            transform: scale(1.05);
        }

        #egg {
            position: absolute;
            width: 100px;
            height: 140px;
            background: #fff;
            border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.05), 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 6;
            pointer-events: none;
        }

        .egg-face {
            font-size: 1.2rem;
            font-weight: bold;
            color: #555;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .btn {
            background: var(--bamboo-green);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(129, 199, 132, 0.4);
            margin-top: 15px;
            width: 80%;
            max-width: 250px;
        }

        #result-screen { display: none; }

        .result-img {
            width: 100%;
            max-width: 280px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .result-title {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 5px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .pulse { animation: pulse 2s infinite ease-in-out; }
    </style>
</head>
<body>

    <div class="bg-leaf leaf-1"></div>
    <div class="bg-leaf leaf-2"></div>

    <!-- Start Overlay -->
    <div id="start-overlay" class="overlay">
        <h1 style="margin-bottom: 5px;">你是哪種蛋？</h1>
        <h2 style="font-weight: 300; margin-top: 0;">端午節 蛋站驚心🥚</h2>
        <div style="font-size: 0.9rem; line-height: 1.6; color: #666; margin-bottom: 20px;">
            擺動手機，將蛋蛋移至虛線框中心。<br>
            需<b>穩住 1 秒</b>才算成功唷！
        </div>
        <button class="btn pulse" onclick="requestPermissions()">開始挑戰</button>
    </div>

    <!-- Game UI -->
    <div id="game-ui">
        <div class="timer-display">剩餘時間: <span id="timer">10</span>s</div>
    </div>

    <!-- Stage -->
    <div id="stage">
        <div id="egg-frame"></div>
        <div id="egg">
            <span style="font-size: 2rem;">🥚</span>
            <span class="egg-face">*￣v￣*</span>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="overlay">
        <img id="result-image" src="" alt="Result" class="result-img">
        <div id="result-text" class="result-title"></div>
        <div id="result-subtext" style="margin-bottom: 20px; color: #666;"></div>
        <button class="btn" onclick="shareResult()">[分享祝福給朋友]</button>
        <button class="btn" style="background: #999;" onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        const TIMER_TOTAL = 10;
        const HOLD_DURATION = 500; // 0.5 seconds in ms
        let timeLeft = TIMER_TOTAL;
        let gameActive = false;
        let timerInterval;
        let startTime;
        let stayStartTime = null; 
        let currentResultPath = "";

        let eggPos = { x: 0, y: 0 };
        let eggVel = { x: 0, y: 0 };
        const friction = 0.92;
        const sensitivity = 0.6;

        const eggEl = document.getElementById('egg');
        const frameEl = document.getElementById('egg-frame');
        const timerEl = document.getElementById('timer');
        const startOverlay = document.getElementById('start-overlay');
        const resultScreen = document.getElementById('result-screen');
        const resultImg = document.getElementById('result-image');
        const resultText = document.getElementById('result-text');
        const resultSubtext = document.getElementById('result-subtext');

        function requestPermissions() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') startGame();
                        else alert('需要權限才能玩唷！');
                    })
                    .catch(console.error);
            } else {
                startGame();
            }
        }

        function startGame() {
            startOverlay.style.display = 'none';
            gameActive = true;
            startTime = Date.now();
            
            // Random start pos
            eggPos.x = (Math.random() - 0.5) * (window.innerWidth * 0.5);
            eggPos.y = (Math.random() - 0.5) * (window.innerHeight * 0.5);

            window.addEventListener('deviceorientation', handleOrientation);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0 && gameActive) endGame(false);
            }, 1000);

            updatePhysics();
        }

        function handleOrientation(event) {
            if (!gameActive) return;
            eggVel.x += event.gamma * sensitivity;
            eggVel.y += event.beta * sensitivity;
        }

        function updatePhysics() {
            if (!gameActive) return;

            eggVel.x *= friction;
            eggVel.y *= friction;
            eggPos.x += eggVel.x * 0.15;
            eggPos.y += eggVel.y * 0.15;

            // Constrain
            const limitX = window.innerWidth / 2 - 50;
            const limitY = window.innerHeight / 2 - 70;
            if (Math.abs(eggPos.x) > limitX) eggPos.x = Math.sign(eggPos.x) * limitX;
            if (Math.abs(eggPos.y) > limitY) eggPos.y = Math.sign(eggPos.y) * limitY;

            eggEl.style.transform = `translate(${eggPos.x}px, ${eggPos.y}px)`;

            // 2-second hold logic
            const dist = Math.sqrt(eggPos.x * eggPos.x + eggPos.y * eggPos.y);
            if (dist < 25) {
                if (!stayStartTime) {
                    stayStartTime = Date.now();
                    frameEl.classList.add('holding');
                } else if (Date.now() - stayStartTime >= HOLD_DURATION) {
                    endGame(true);
                    return;
                }
            } else {
                stayStartTime = null;
                frameEl.classList.remove('holding');
            }

            requestAnimationFrame(updatePhysics);
        }

        function endGame(success) {
            gameActive = false;
            clearInterval(timerInterval);
            window.removeEventListener('deviceorientation', handleOrientation);

            const duration = (Date.now() - startTime) / 1000;
            resultScreen.style.display = 'flex';

            if (success) {
                if (duration <= 6) {
                    currentResultPath = './eggcalm.jpg';
                    resultImg.src = currentResultPath;
                    resultText.innerText = "祝福端午佳節愉快";
                    resultSubtext.innerText = "蛋定大師在此，好運一整年！";
                } else {
                    currentResultPath = './loosegg.jpg';
                    resultImg.src = currentResultPath;
                    resultText.innerText = "立蛋成功！";
                    resultSubtext.innerText = "連假就是要盡情放粽，享受節日！";
                }
            } else {
                resultImg.style.display = 'none';
                resultText.innerText = "挑戰失敗...";
                resultSubtext.innerText = "沒關係，，再試一次！";
            }
        }

        // 分享邏輯：優先嘗試分享圖片檔案
        async function shareResult() {
            const title = "端午節 蛋站驚心挑戰成功！";
            const text = "我成功立蛋啦！分享端午祝福圖，快來挑戰！";
            
            if (currentResultPath === "") {
                alert("挑戰成功後才能分享唷！");
                return;
            }

            try {
                // 嘗試獲取圖片並轉換為 File 物件進行分享
                const response = await fetch(currentResultPath);
                const blob = await response.blob();
                const file = new File([blob], currentResultPath.split('/').pop(), { type: blob.type });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: title,
                        text: text,
                    });
                } else {
                    // 不支援檔案分享則分享連結
                    await navigator.share({
                        title: title,
                        text: text,
                        url: window.location.href
                    });
                }
            } catch (err) {
                copyToClipboard(text);
            }
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text + " " + window.location.href;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('成就文字與連結已複製！快傳給 LINE 好友吧！');
        }

        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
