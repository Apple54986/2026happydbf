<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>端午節 蛋站驚心</title>
    <style>
        :root {
            --mint-green: #e8f5e9;
            --bamboo-green: #81c784;
            --sky-blue: #e0f7fa;
            --accent-gold: #ffd700;
            --text-dark: #2e7d32;
            --success-gold: #fb8c00;
            /* New Festive Colors */
            --dbf-mint: #A3E4D7;
            --dbf-mint-light: #D1F2EB;
            --dbf-teal: #0E6251;
            --dbf-river: #EBF5FB;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, var(--sky-blue) 0%, var(--mint-green) 100%);
            color: var(--text-dark);
        }

        /* --- Global Background Decorations --- */
        .bg-leaf {
            position: absolute;
            width: 300px;
            height: 100px;
            background: rgba(129, 199, 132, 0.1);
            border-radius: 0 100% 0 100%;
            transform: rotate(-15deg);
            z-index: 0;
        }
        .leaf-1 { top: 10%; left: -50px; }
        .leaf-2 { bottom: 15%; right: -50px; transform: rotate(165deg); }

        /* --- Start Screen (Cover) Specific Styles --- */
        #start-overlay {
            background: linear-gradient(180deg, var(--dbf-mint-light) 0%, #ffffff 100%);
            overflow: hidden;
        }

        .cover-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cover-brand {
            font-size: 1.1rem;
            color: var(--dbf-teal);
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .cover-title {
            font-size: 1.8rem;
            color: var(--dbf-teal);
            margin: 0 0 15px 0;
            font-weight: 900;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title-egg-icon {
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            border: 2px solid var(--dbf-teal);
            display: inline-block;
            box-shadow: 2px 2px 0px var(--bamboo-green);
        }

        /* Festive Decorations */
        .bamboo-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .svg-leaf {
            position: absolute;
            fill: var(--bamboo-green);
            opacity: 0.4;
        }

        .river-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            z-index: 2;
        }

        .dragon-boat {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            animation: boatFloat 3s infinite ease-in-out;
        }

        @keyframes boatFloat {
            0%, 100% { transform: translate(-50%, 0) rotate(0deg); }
            50% { transform: translate(-50%, -5px) rotate(1deg); }
        }

        /* --- Game Elements --- */
        #game-ui {
            position: relative;
            z-index: 10;
            text-align: center;
            padding-top: 40px;
        }

        .timer-display {
            font-size: 1.5rem;
            font-weight: bold;
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: inline-block;
        }

        #stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        #egg-frame {
            width: 120px;
            height: 160px;
            border: 3px dashed var(--bamboo-green);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        #egg-frame.holding {
            border: 4px solid var(--success-gold);
            box-shadow: 0 0 20px rgba(251, 140, 0, 0.4);
            opacity: 1;
            transform: scale(1.05);
        }

        #egg {
            position: absolute;
            width: 100px;
            height: 140px;
            background: #fff;
            border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.05), 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 6;
            pointer-events: none;
        }

        .egg-face {
            font-size: 1.2rem;
            font-weight: bold;
            color: #555;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .btn {
            background: var(--dbf-teal);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(14, 98, 81, 0.3);
            margin-top: 15px;
            width: 85%;
            max-width: 260px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.95); }

        #result-screen { display: none; }

        .result-img {
            width: 100%;
            max-width: 280px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .result-title {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 5px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .pulse { animation: pulse 2s infinite ease-in-out; }
    </style>
</head>
<body>

    <div class="bg-leaf leaf-1"></div>
    <div class="bg-leaf leaf-2"></div>

    <!-- Start Overlay (Redesigned) -->
    <div id="start-overlay" class="overlay">
        <!-- SVG Bamboo Decoration -->
        <div class="bamboo-frame">
            <svg class="svg-leaf" style="top: -20px; left: -20px; width: 150px; transform: rotate(10deg);" viewBox="0 0 100 100"><path d="M10,90 Q50,0 90,90 T10,90" /></svg>
            <svg class="svg-leaf" style="top: 20px; right: -40px; width: 120px; transform: rotate(-30deg);" viewBox="0 0 100 100"><path d="M10,90 Q50,0 90,90 T10,90" /></svg>
        </div>

        <div class="cover-content">
            <div class="cover-brand">蛋站驚心</div>
            <h1 class="cover-title">
                2026 端午節挑戰 <span class="title-egg-icon"></span>
            </h1>
            <div style="font-size: 0.95rem; line-height: 1.6; color: var(--dbf-teal); margin-bottom: 25px; font-weight: 500;">
                手機版立蛋：擺動手機將蛋站立在框框中吧！<br>
            </div>
            <button class="btn pulse" onclick="requestPermissions()">開始挑戰</button>
        </div>

       <!-- River and Dragon Boat / Leaf Boat -->
        <div class="river-container">
            <!-- 調整為粽葉造型的龍舟 -->
            <svg class="dragon-boat" viewBox="0 0 200 60">
                <!-- 粽葉船身：調整為流線尖頭造型 -->
                <path d="M5,35 Q100,65 195,35 Q100,45 5,35 Z" fill="#2E7D32" /> 
                <!-- 葉脈細節：增加一條深色中心線讓它更像葉子 -->
                <path d="M5,35 Q100,58 195,35" fill="none" stroke="#1B5E20" stroke-width="1" opacity="0.6" />
                
                <!-- 龍頭：保留節慶感 -->
                <path d="M185,40 Q205,5 175,20" fill="none" stroke="#0E6251" stroke-width="4" stroke-linecap="round" /> 
                <circle cx="190" cy="22" r="1.5" fill="#ffd700" /> <!-- 龍眼 -->
                
                <!-- 船槳：稍微傾斜更有划動感 -->
                <line x1="60" y1="45" x2="55" y2="58" stroke="#81c784" stroke-width="2" />
                <line x1="90" y1="48" x2="85" y2="61" stroke="#81c784" stroke-width="2" />
                <line x1="120" y1="48" x2="115" y2="61" stroke="#81c784" stroke-width="2" />
            </svg>
            
            <!-- 河流波浪保持不變 -->
            <svg width="100%" height="60" preserveAspectRatio="none" viewBox="0 0 1440 120" style="position: absolute; bottom: 0;">
                <path fill="#D1F2EB" fill-opacity="1" d="M0,64L80,69.3C160,75,320,85,480,80C640,75,800,53,960,48C1120,43,1280,53,1360,58.7L1440,64L1440,120L1360,120C1280,120,1120,120,960,120C800,120,640,120,480,120C320,120,160,120,80,120L0,120Z"></path>
            </svg>
        </div>
            <!-- River Waves SVG -->
            <svg width="100%" height="60" preserveAspectRatio="none" viewBox="0 0 1440 120" style="position: absolute; bottom: 0;">
                <path fill="#D1F2EB" fill-opacity="1" d="M0,64L80,69.3C160,75,320,85,480,80C640,75,800,53,960,48C1120,43,1280,53,1360,58.7L1440,64L1440,120L1360,120C1280,120,1120,120,960,120C800,120,640,120,480,120C320,120,160,120,80,120L0,120Z"></path>
            </svg>
        </div>
    </div>

    <!-- Game UI -->
    <div id="game-ui">
        <div class="timer-display">剩餘時間: <span id="timer">10</span>s</div>
    </div>

    <!-- Stage -->
    <div id="stage">
        <div id="egg-frame"></div>
        <div id="egg">
            <span class="egg-face">*￣v￣*</span>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="overlay">
        <img id="result-image" src="" alt="Result" class="result-img">
        <div id="result-text" class="result-title"></div>
        <div id="result-subtext" style="margin-bottom: 20px; color: #666;"></div>
        <button class="btn" onclick="shareResult()">[分享祝福給朋友]</button>
        <button class="btn" style="background: #999;" onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC (REMAINING UNCHANGED) ---
        const TIMER_TOTAL = 10;
        const HOLD_DURATION = 700; // 0.7 seconds in ms
        let timeLeft = TIMER_TOTAL;
        let gameActive = false;
        let timerInterval;
        let startTime;
        let stayStartTime = null; 
        let currentResultPath = "";

        let eggPos = { x: 0, y: 0 };
        let eggVel = { x: 0, y: 0 };
        const friction = 0.92;
        const sensitivity = 0.6;

        const eggEl = document.getElementById('egg');
        const frameEl = document.getElementById('egg-frame');
        const timerEl = document.getElementById('timer');
        const startOverlay = document.getElementById('start-overlay');
        const resultScreen = document.getElementById('result-screen');
        const resultImg = document.getElementById('result-image');
        const resultText = document.getElementById('result-text');
        const resultSubtext = document.getElementById('result-subtext');

        function requestPermissions() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') startGame();
                        else alert('需要權限才能玩唷！');
                    })
                    .catch(console.error);
            } else {
                startGame();
            }
        }

        function startGame() {
            startOverlay.style.display = 'none';
            gameActive = true;
            startTime = Date.now();
            
            eggPos.x = (Math.random() - 0.5) * (window.innerWidth * 0.5);
            eggPos.y = (Math.random() - 0.5) * (window.innerHeight * 0.5);

            window.addEventListener('deviceorientation', handleOrientation);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0 && gameActive) endGame(false);
            }, 1000);

            updatePhysics();
        }

        function handleOrientation(event) {
            if (!gameActive) return;
            eggVel.x += event.gamma * sensitivity;
            eggVel.y += event.beta * sensitivity;
        }

        function updatePhysics() {
            if (!gameActive) return;

            eggVel.x *= friction;
            eggVel.y *= friction;
            eggPos.x += eggVel.x * 0.15;
            eggPos.y += eggVel.y * 0.15;

            const limitX = window.innerWidth / 2 - 50;
            const limitY = window.innerHeight / 2 - 70;
            if (Math.abs(eggPos.x) > limitX) eggPos.x = Math.sign(eggPos.x) * limitX;
            if (Math.abs(eggPos.y) > limitY) eggPos.y = Math.sign(eggPos.y) * limitY;

            eggEl.style.transform = `translate(${eggPos.x}px, ${eggPos.y}px)`;

            const dist = Math.sqrt(eggPos.x * eggPos.x + eggPos.y * eggPos.y);
            if (dist < 25) {
                if (!stayStartTime) {
                    stayStartTime = Date.now();
                    frameEl.classList.add('holding');
                } else if (Date.now() - stayStartTime >= HOLD_DURATION) {
                    endGame(true);
                    return;
                }
            } else {
                stayStartTime = null;
                frameEl.classList.remove('holding');
            }

            requestAnimationFrame(updatePhysics);
        }

        function endGame(success) {
            gameActive = false;
            clearInterval(timerInterval);
            window.removeEventListener('deviceorientation', handleOrientation);

            const duration = (Date.now() - startTime) / 1000;
            resultScreen.style.display = 'flex';

            if (success) {
                if (duration <= 6) { // Branching logic for 6 seconds
                    currentResultPath = './eggcalm.jpg';
                    resultImg.src = currentResultPath;
                    resultText.innerText = "端午佳節愉快";
                    resultSubtext.innerText = "蛋定大師在此，好運一整年！";
                } else {
                    currentResultPath = './loosegg.jpg';
                    resultImg.src = currentResultPath;
                    resultText.innerText = "立蛋成功！";
                    resultSubtext.innerText = "連假就是要盡情放粽，享受節日！";
                }
            } else {
                resultImg.style.display = 'none';
                resultText.innerText = "挑戰失敗...";
                resultSubtext.innerText = "沒關係，再試一次！";
            }
        }

        async function shareResult() {
            const title = "端午節 蛋站驚心挑戰成功！";
            const text = "端午佳節愉快🔥來挑戰蛋站驚心吧！https://apple54986.github.io/2026happydbf/";
            
            if (currentResultPath === "") {
                alert("挑戰成功後才能分享唷！");
                return;
            }

            try {
                const response = await fetch(currentResultPath);
                const blob = await response.blob();
                const file = new File([blob], currentResultPath.split('/').pop(), { type: blob.type });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: title,
                        text: text,
                    });
                } else {
                    await navigator.share({
                        title: title,
                        text: text,
                        url: window.location.href
                    });
                }
            } catch (err) {
                copyToClipboard(text);
            }
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text + " " + window.location.href;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('趕快分享給好友吧！');
        }

        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
